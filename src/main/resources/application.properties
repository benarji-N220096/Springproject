# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/employee_portal_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=bunny6281

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8080

# Logging
logging.level.org.springframework.security=DEBUG

# ==========================================
# EMAIL INTEGRATION (SMTP CONFIGURATION)
# ==========================================
# We use environment variables so we do not hardcode passwords in source code.
# Example: SMTP_HOST=smtp.gmail.com, SMTP_PORT=587, SMTP_USERNAME=your.email@gmail.com, SMTP_PASSWORD=your_app_password
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:user}
spring.mail.password=${SMTP_PASSWORD:pass}

# Enable SMTP Authentication. Required by almost all real email providers (Gmail, Outlook, etc.)
spring.mail.properties.mail.smtp.auth=true
# Enable STARTTLS. Upgrades a plain text connection to an encrypted (TLS) one.
spring.mail.properties.mail.smtp.starttls.enable=true
# Show email debug logs (Optional, useful for learning/debugging)
# spring.mail.properties.mail.debug=true
